name: Update YouTube RSS mirror

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch YouTube feed
        run: |
          curl -L \
          "https://www.youtube.com/feeds/videos.xml?channel_id=UCEOJMoIqrd5vJDPIWZz7s_Q" \
          -o youtubefetcher.xml

      - name: Commit updated feed if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "actions@github.com"

          git add youtubefetcher.xml

          if ! git diff --cached --quiet; then
            git commit -m "Update YouTube feed"
            git push
          fi
